<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gisel Signal | Investigation Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>

<body>
    <div class="ambient-bg"></div>
    <div class="app-container">

        <aside class="sidebar glass-panel">
            <div class="sidebar-header">
                <div class="logo-mark"></div>
                <div class="brand">
                    <h1>Gisel Signal</h1>
                    <p class="sub">v1.5 Database Dashboard</p>
                </div>
            </div>

            <nav class="nav-menu">
                <button data-tab="timeline" class="nav-btn active">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 8v4l3 3M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                    </svg>
                    <span>Timeline</span>
                </button>
                <button data-tab="map" class="nav-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m22 8-6-4-6 4-6-4v12l6 4 6-4 6 4V8z" />
                        <path d="M8 4v12" />
                        <path d="M16 8v12" />
                    </svg>
                    <span>Cassini Coordinates</span>
                </button>
                <button data-tab="graph" class="nav-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 6a2 2 0 1 1-4 0 2 2 0 0 1 4 0Z" />
                        <path d="M22 18a2 2 0 1 1-4 0 2 2 0 0 1 4 0Z" />
                        <path d="M10 18a2 2 0 1 1-4 0 2 2 0 0 1 4 0Z" />
                        <path d="M14 6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h2" />
                        <path d="M15.4 7.4 18.6 15.6" />
                        <path d="M11 16h4" />
                    </svg>
                    <span>Vault</span>
                </button>

            </nav>

            <div class="sidebar-footer">
                <p>Local-first FL/UAP board</p>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar glass-panel">
                <h2 id="current-view-title">Timeline</h2>
                <div class="actions" id="top-bar-actions">
                    <div id="timeline-controls" class="control-group active">
                        <input type="text" id="timelineSearch" placeholder="Search events..." class="glass-input" />
                    </div>

                </div>
            </header>

            <div class="content-area">
                <section id="timeline" class="tab active">
                    <div id="timelineList" class="grid-list"></div>
                </section>

                <section id="map" class="tab">
                    <div class="glass-panel map-container">
                        <div id="mapView"></div>
                    </div>
                </section>

                <section id="graph" class="tab">
                    <p class="hint">Top weighted links from connection graph</p>
                    <div id="graphList" class="grid-list"></div>
                </section>


            </div>
        </main>

    </div>

    <script src="data/events.js"></script>
    <script src="data/connections.js"></script>

    <script src="data/map.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>

</html>
